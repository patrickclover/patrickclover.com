version: 0.2

phases:
    install:
        runtime-versions:
            nodejs: 18
        commands:
            - corepack enable
            - corepack prepare yarn@1.22.22 --activate
            - yarn install --frozen-lockfile
    build:
        commands:
            - yarn build

    post_build:
        commands:
            # 1. Hashed, immutable static assets (1 year). CRA emits these into /static/**.
            - >
              aws s3 sync ./build/static "s3://${DeployBucket}/static"
              --acl public-read
              --cache-control "public, max-age=31536000, immutable"
            # 2. Self-hosted fonts (1 year, immutable — filename never changes).
            - >
              aws s3 sync ./build/fonts "s3://${DeployBucket}/fonts"
              --acl public-read
              --cache-control "public, max-age=31536000, immutable"
              --content-type "font/woff2"
            # 3. Long-lived but mutable assets (OG image, brand assets) — 30 days.
            - >
              aws s3 sync ./build/assets "s3://${DeployBucket}/assets"
              --acl public-read
              --cache-control "public, max-age=2592000, stale-while-revalidate=86400"
            # 4. Favicon (7 days, allow revalidation).
            - >
              aws s3 cp ./build/favicon.svg "s3://${DeployBucket}/favicon.svg"
              --acl public-read
              --cache-control "public, max-age=604800, stale-while-revalidate=86400"
              --content-type "image/svg+xml"
            # 5. Manifest (1 day, allow revalidation).
            - >
              aws s3 cp ./build/manifest.json "s3://${DeployBucket}/manifest.json"
              --acl public-read
              --cache-control "public, max-age=86400, stale-while-revalidate=3600"
              --content-type "application/manifest+json"
            # 6. Service worker (no cache — always fetch the latest so updates roll out fast).
            - >
              aws s3 cp ./build/service-worker.js "s3://${DeployBucket}/service-worker.js"
              --acl public-read
              --cache-control "public, max-age=0, must-revalidate"
              --content-type "application/javascript"
            # 7. index.html (no cache — the SW + CDN handle the warm path).
            - >
              aws s3 cp ./build/index.html "s3://${DeployBucket}/index.html"
              --acl public-read
              --cache-control "public, max-age=0, must-revalidate"
              --content-type "text/html; charset=utf-8"
            # 8. Sweep any orphaned objects so deleted assets stop being served.
            - >
              aws s3 sync ./build "s3://${DeployBucket}"
              --acl public-read
              --delete
              --exclude "static/*" --exclude "fonts/*" --exclude "assets/*"
              --exclude "favicon.svg" --exclude "manifest.json"
              --exclude "service-worker.js" --exclude "index.html"
              --cache-control "public, max-age=3600"
            # 9. Invalidate the always-fresh paths at the edge.
            - >
              aws cloudfront create-invalidation --distribution-id ${Distribution}
              --paths /index.html /service-worker.js /manifest.json

artifacts:
    files:
        - '**/*'
    base-directory: build
